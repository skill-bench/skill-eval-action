name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: '3.13'
          activate-environment: 'true'

      - name: Install tools
        run: uv pip install ruff pyyaml zizmor

      - name: Lint Python scripts
        run: ruff check scripts/

      - name: Validate action.yml
        run: |
          python -c "
          import yaml, re
          with open('action.yml') as f:
              content = f.read()
          clean = re.sub(r'\$\{\{.*?\}\}', 'PLACEHOLDER', content)
          data = yaml.safe_load(clean)
          assert 'name' in data, 'Missing name'
          assert 'inputs' in data, 'Missing inputs'
          assert 'runs' in data, 'Missing runs'
          print('action.yml is valid')
          "

      - name: Lint workflows with zizmor
        run: zizmor action.yml .github/workflows/*.yml
